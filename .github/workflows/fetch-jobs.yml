name: Fetch Jobs from Airtable

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch from Airtable and write jobs.json
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: |
          curl -s \
            -H "Authorization: Bearer $AIRTABLE_TOKEN" \
            "https://api.airtable.com/v0/$AIRTABLE_BASE_ID/Jobs?filterByFormula=%7BStatus%7D%3D'Active'&sort%5B0%5D%5Bfield%5D=Posting%20Date&sort%5B0%5D%5Bdirection%5D=desc" \
            > jobs.json

      - name: Commit and push jobs.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add jobs.json
          git diff --staged --quiet || git commit -m "Update jobs.json from Airtable"
          git push